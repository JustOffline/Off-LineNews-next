name: Deploy Next.js to GitHub Pages

# This repo (Off-LineNews-next) is the isolated rebuild sibling per
# CLAUDE.md §10.1 — it has no production content to protect, so pushing
# to main auto-deploys. The actual production site (JustOffline/Off-LineNews)
# is untouched by this workflow entirely; it lives in a different repo.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Next.js static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      - name: Set up Node 24
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate content cards + feed
        run: npm run generate:content

      - name: Build static export
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: "out"

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      # A pass here only means the deploy is live and correct at this moment —
      # it does not prevent a bad deploy from going out; deploy-pages already
      # ran above. If this fails, the site is already live-but-wrong. Rollback
      # is `git revert` the content commit and re-push to trigger a clean deploy.
      - name: Smoke test deployed content
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          for i in 1 2 3 4 5; do
            BODY="$(curl -fs "$URL" || true)"
            if echo "$BODY" | grep -q "TikTok"; then
              echo "Smoke test passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/5: expected content not found yet, retrying in 5s..."
            sleep 5
          done
          echo "::error::Smoke test failed after 5 attempts — 'TikTok' not found at $URL"
          echo "--- last response body ---"
          echo "$BODY"
          exit 1
